name: Déployer avec token secret

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
      
      - name: Créer config.js avec le token secret
        run: |
          echo "// Ce fichier est généré automatiquement par GitHub Actions" > config.js
          echo "// Ne pas modifier manuellement" >> config.js
          echo "" >> config.js
          echo "const GITHUB_TOKEN_FROM_CONFIG = '${{ secrets.GITHUB_TOKEN }}';" >> config.js
          echo "✅ config.js créé avec succès"
      
      - name: Vérifier que config.js a été créé
        run: |
          if [ -f "config.js" ]; then
            echo "📄 config.js existe"
            cat config.js
          else
            echo "❌ config.js n'a pas été créé"
            exit 1
          fi
      
      - name: Committer config.js sur main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.js
          git commit -m "Ajout automatique de config.js avec token [skip ci]" || echo "Rien à committer"
          git push