echo 'name: Inject Token

on:
  push:
    branches: [ main ]

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}
      
      - name: Inject token into config.js
        run: echo "const GITHUB_TOKEN_FROM_CONFIG = '\''${{ secrets.MY_GITHUB_TOKEN }}'\'';" > config.js
      
      - name: Commit and push config.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.js
          git commit -m "Inject token" || echo "No changes"
          git push' > .github/workflows/deploy.yml